sources:
  平均泌乳量:
    endpoint: milk_yield
    url: https://lin.alic.go.jp/alic/statis/dome/data2/j_excel/5030a.xlsx
    items:
      milk_yield_hokkaido:
        category: milk
        unit: kg/日/頭
        label: 北海道平均泌乳量
        description: 北海道の1日あたり平均泌乳量
      milk_yield_honshu:
        category: milk
        unit: kg/日/頭
        label: 本州平均泌乳量
        description: 本州の1日あたり平均泌乳量

  生乳農家販売価格:
    endpoint: milk_price
    url: https://lin.alic.go.jp/alic/statis/dome/data2/j_excel/5051A.xlsx
    items:
      milk_price:
        category: milk
        unit: 円/kg
        label: 生乳価格
        description: 生乳農家販売価格

